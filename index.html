<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issue Board (GraphQL)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* カスタムスクロールバー */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .board-column { min-height: 200px; height: calc(100vh - 180px); overflow-y: auto; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased">

    <!-- ヘッダーと設定エリア -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-10">
        <div class="max-w-[1800px] mx-auto px-4 sm:px-6 lg:px-8 py-4">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                <h1 class="text-xl font-bold flex items-center gap-2 text-slate-700">
                    <i class="fab fa-github"></i> Issue Viewer
                </h1>
                
                <div class="flex flex-wrap items-center gap-3">
                    <input type="text" id="ownerInput" placeholder="Owner (例: facebook)" class="px-3 py-1.5 border border-slate-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 w-32 md:w-40">
                    <span class="text-slate-400">/</span>
                    <input type="text" id="repoInput" placeholder="Repo (例: react)" class="px-3 py-1.5 border border-slate-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 w-32 md:w-40">
                    
                    <div class="relative group">
                        <input type="password" id="tokenInput" placeholder="Access Token (必須)" class="px-3 py-1.5 border border-slate-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 w-48">
                        <div class="absolute hidden group-hover:block bg-slate-800 text-white text-xs p-2 rounded -bottom-10 left-0 w-64 shadow-lg z-20">
                            ※GraphQL APIを使用するため、<br>Personal Access Tokenが必須です。
                        </div>
                    </div>
                    
                    <button onclick="loadIssues()" id="fetchBtn" class="bg-slate-800 hover:bg-slate-700 text-white px-4 py-1.5 rounded-md text-sm font-medium transition-colors flex items-center gap-2 shadow-sm">
                        <i class="fas fa-sync-alt" id="loadingIcon"></i> 読み込む
                    </button>
                </div>
            </div>
            <!-- メッセージ表示エリア -->
            <div id="messageArea" class="mt-2 text-sm hidden"></div>
        </div>
    </header>

    <!-- かんばんボードエリア -->
    <main class="max-w-[1800px] mx-auto px-4 sm:px-6 lg:px-8 py-6">
        <div class="grid grid-cols-1 md:grid-cols-3 xl:grid-cols-6 gap-4">
            
            <!-- 未アサイン -->
            <div class="bg-slate-100/80 rounded-xl p-3 border border-slate-200 flex flex-col shadow-sm">
                <div class="flex items-center justify-between mb-3 px-1">
                    <h2 class="font-bold text-slate-700 text-sm flex items-center gap-2">
                        <span class="w-2.5 h-2.5 rounded-full bg-red-400 shadow-sm"></span> 未アサイン
                    </h2>
                    <span id="count-unassigned" class="bg-white border border-slate-200 text-slate-600 text-xs font-bold px-2 py-0.5 rounded-full shadow-sm">0</span>
                </div>
                <div id="col-unassigned" class="board-column flex flex-col gap-3"></div>
            </div>

            <!-- アサイン済み -->
            <div class="bg-slate-100/80 rounded-xl p-3 border border-slate-200 flex flex-col shadow-sm">
                <div class="flex items-center justify-between mb-3 px-1">
                    <h2 class="font-bold text-slate-700 text-sm flex items-center gap-2">
                        <span class="w-2.5 h-2.5 rounded-full bg-blue-400 shadow-sm"></span> アサイン済み
                    </h2>
                    <span id="count-assigned" class="bg-white border border-slate-200 text-slate-600 text-xs font-bold px-2 py-0.5 rounded-full shadow-sm">0</span>
                </div>
                <div id="col-assigned" class="board-column flex flex-col gap-3"></div>
            </div>

            <!-- レビュワー未決定 -->
            <div class="bg-slate-100/80 rounded-xl p-3 border border-slate-200 flex flex-col shadow-sm">
                <div class="flex items-center justify-between mb-3 px-1">
                    <h2 class="font-bold text-slate-700 text-sm flex items-center gap-2">
                        <span class="w-2.5 h-2.5 rounded-full bg-emerald-300 shadow-sm"></span> レビュワー未決定
                    </h2>
                    <span id="count-pr_no_reviewer" class="bg-white border border-slate-200 text-slate-600 text-xs font-bold px-2 py-0.5 rounded-full shadow-sm">0</span>
                </div>
                <div id="col-pr_no_reviewer" class="board-column flex flex-col gap-3"></div>
            </div>

            <!-- レビュー待ち -->
            <div class="bg-slate-100/80 rounded-xl p-3 border border-slate-200 flex flex-col shadow-sm">
                <div class="flex items-center justify-between mb-3 px-1">
                    <h2 class="font-bold text-slate-700 text-sm flex items-center gap-2">
                        <span class="w-2.5 h-2.5 rounded-full bg-green-500 shadow-sm"></span> レビュー待ち
                    </h2>
                    <span id="count-pr_wait_review" class="bg-white border border-slate-200 text-slate-600 text-xs font-bold px-2 py-0.5 rounded-full shadow-sm">0</span>
                </div>
                <div id="col-pr_wait_review" class="board-column flex flex-col gap-3"></div>
            </div>

            <!-- レビュー修正待ち -->
            <div class="bg-slate-100/80 rounded-xl p-3 border border-slate-200 flex flex-col shadow-sm">
                <div class="flex items-center justify-between mb-3 px-1">
                    <h2 class="font-bold text-slate-700 text-sm flex items-center gap-2">
                        <span class="w-2.5 h-2.5 rounded-full bg-yellow-400 shadow-sm"></span> レビュー修正待ち
                    </h2>
                    <span id="count-reviewed" class="bg-white border border-slate-200 text-slate-600 text-xs font-bold px-2 py-0.5 rounded-full shadow-sm">0</span>
                </div>
                <div id="col-reviewed" class="board-column flex flex-col gap-3"></div>
            </div>

            <!-- 再レビュー待ち -->
            <div class="bg-slate-100/80 rounded-xl p-3 border border-slate-200 flex flex-col shadow-sm">
                <div class="flex items-center justify-between mb-3 px-1">
                    <h2 class="font-bold text-slate-700 text-sm flex items-center gap-2">
                        <span class="w-2.5 h-2.5 rounded-full bg-cyan-400 shadow-sm"></span> 再レビュー待ち
                    </h2>
                    <span id="count-updated" class="bg-white border border-slate-200 text-slate-600 text-xs font-bold px-2 py-0.5 rounded-full shadow-sm">0</span>
                </div>
                <div id="col-updated" class="board-column flex flex-col gap-3"></div>
            </div>

        </div>
    </main>

    <script>
        // ローカルストレージラッパー
        const storage = {
            get: (key) => { try { return localStorage.getItem(key); } catch(e) { return null; } },
            set: (key, value) => { try { localStorage.setItem(key, value); } catch(e) { console.warn(e); } },
            remove: (key) => { try { localStorage.removeItem(key); } catch(e) { console.warn(e); } }
        };

        const TOKEN_KEY = 'github_issue_board_token';

        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const pOwner = urlParams.get('owner');
            const pRepo = urlParams.get('repo');
            
            const urlToken = urlParams.get('token');
            const savedToken = storage.get(TOKEN_KEY);

            let pToken = '';
            if (urlToken) {
                pToken = urlToken;
                storage.set(TOKEN_KEY, pToken);
            } else if (savedToken) {
                pToken = savedToken;
            }
            
            if (pOwner) document.getElementById('ownerInput').value = pOwner;
            if (pRepo) document.getElementById('repoInput').value = pRepo;
            if (pToken) document.getElementById('tokenInput').value = pToken;
            
            if (pOwner && pRepo) {
                loadIssues();
            }
        });

        function showMessage(text, isError = false) {
            const area = document.getElementById('messageArea');
            area.textContent = text;
            area.className = `mt-3 text-sm font-medium px-4 py-2.5 rounded-md shadow-sm border ${isError ? 'bg-red-50 text-red-700 border-red-200' : 'bg-blue-50 text-blue-700 border-blue-200'} block`;
        }

        function hideMessage() {
            document.getElementById('messageArea').classList.add('hidden');
        }

        // GraphQL由来のデータ構造に合わせてカード生成関数を修正
        function createCardHTML(node) {
            const isPR = node.__typename === 'PullRequest';
            
            // ラベルの生成
            let labelsHtml = '';
            if (node.labels && node.labels.nodes.length > 0) {
                labelsHtml = node.labels.nodes.map(label => {
                    const hex = label.color;
                    const r = parseInt(hex.substr(0, 2), 16);
                    const g = parseInt(hex.substr(2, 2), 16);
                    const b = parseInt(hex.substr(4, 2), 16);
                    const yiq = ((r * 299) + (g * 587) + (b * 114)) / 1000;
                    const isLight = yiq >= 128;
                    
                    const textColor = isLight ? '#1e293b' : '#ffffff';
                    const borderColor = isLight ? 'rgba(0,0,0,0.1)' : 'rgba(255,255,255,0.2)';
                    
                    return `<span class="text-[11px] px-2 py-0.5 rounded-full font-medium tracking-wide shadow-sm" 
                                  style="background-color: #${label.color}; color: ${textColor}; border: 1px solid ${borderColor};">
                        ${label.name}
                    </span>`;
                }).join('');
            }

            // アサインされた人の表示
            let assigneesHtml = '';
            if (node.assignees && node.assignees.nodes.length > 0) {
                assigneesHtml = node.assignees.nodes.map(user => `
                    <div class="flex items-center gap-1.5 bg-slate-50 px-2 py-1 rounded-md border border-slate-200 shadow-sm" title="Assigned to ${user.login}">
                        <img src="${user.avatarUrl}" alt="${user.login}" class="w-4 h-4 rounded-full">
                        <span class="text-[11px] font-bold text-slate-700">${user.login}</span>
                    </div>
                `).join('');
            }

            const icon = isPR ? '<i class="fas fa-code-branch text-green-600"></i>' : '<i class="far fa-dot-circle text-green-500"></i>';
            const authorLogin = node.author ? node.author.login : 'Unknown';

            return `
                <a href="${node.url}" target="_blank" rel="noopener noreferrer" 
                   class="block bg-white p-3.5 rounded-lg shadow-sm border border-slate-200 hover:shadow-md hover:border-blue-400 hover:-translate-y-0.5 transition-all group flex flex-col gap-2.5">
                    <div class="flex items-start gap-2">
                        <div class="mt-0.5 flex-shrink-0">${icon}</div>
                        <h3 class="text-sm font-bold text-slate-800 leading-snug group-hover:text-blue-600 transition-colors">
                            ${node.title}
                        </h3>
                    </div>
                    
                    ${labelsHtml ? `<div class="flex flex-wrap gap-1.5">${labelsHtml}</div>` : ''}
                    
                    <div class="text-[11px] text-slate-500 font-medium truncate">
                        opened by ${authorLogin}
                    </div>

                    <div class="flex flex-col gap-2 mt-auto pt-2.5 border-t border-slate-100 min-h-[28px]">
                        <div class="flex items-center justify-between">
                            <span class="text-xs font-bold text-slate-400">#${node.number}</span>
                        </div>
                        ${assigneesHtml ? `<div class="flex flex-wrap gap-1">${assigneesHtml}</div>` : '<div></div>'}
                    </div>
                </a>
            `;
        }

        function renderColumns(categorized) {
            Object.keys(categorized).forEach(key => {
                const column = document.getElementById(`col-${key}`);
                const countSpan = document.getElementById(`count-${key}`);
                
                column.innerHTML = '';
                countSpan.textContent = categorized[key].length;
                
                categorized[key].forEach(issue => {
                    column.innerHTML += createCardHTML(issue);
                });
            });
        }

        async function loadIssues() {
            const owner = document.getElementById('ownerInput').value.trim();
            const repo = document.getElementById('repoInput').value.trim();
            const token = document.getElementById('tokenInput').value.trim();
            const btn = document.getElementById('fetchBtn');
            const icon = document.getElementById('loadingIcon');

            if (!owner || !repo) {
                showMessage('OwnerとRepoを入力してください。（例: ownerに "facebook"、repoに "react"）', true);
                return;
            }

            if (!token) {
                showMessage('GraphQL APIを使用するため、Access Tokenが必須です。', true);
                return;
            }

            storage.set(TOKEN_KEY, token);

            try {
                const newUrl = new URL(window.location);
                newUrl.searchParams.set('owner', owner);
                newUrl.searchParams.set('repo', repo);
                newUrl.searchParams.delete('token');
                window.history.replaceState({}, '', newUrl);
            } catch (e) {
                console.warn('URL履歴の書き換えがブロックされました:', e.message);
            }

            btn.disabled = true;
            icon.classList.add('fa-spin');
            hideMessage();

            const categorized = {
                unassigned: [],
                assigned: [],
                pr_no_reviewer: [],
                pr_wait_review: [],
                reviewed: [],
                updated: []
            };
            
            renderColumns(categorized);

            // GraphQLクエリ：IssueとPRの両方を同時に、必要な履歴も含めて取得
            const query = `
            query {
              repository(owner: "${owner}", name: "${repo}") {
                issues(states: OPEN, first: 100, orderBy: {field: CREATED_AT, direction: DESC}) {
                  nodes {
                    __typename
                    number
                    title
                    url
                    author { login }
                    labels(first: 5) { nodes { name color } }
                    assignees(first: 5) { nodes { login avatarUrl } }
                  }
                }
                pullRequests(states: OPEN, first: 100, orderBy: {field: CREATED_AT, direction: DESC}) {
                  nodes {
                    __typename
                    number
                    title
                    url
                    author { login }
                    labels(first: 5) { nodes { name color } }
                    assignees(first: 5) { nodes { login avatarUrl } }
                    reviewRequests(first: 1) { totalCount }
                    latestReviews(first: 1) {
                      nodes { submittedAt }
                    }
                    commits(last: 1) {
                      nodes { commit { pushedDate } }
                    }
                  }
                }
              }
            }`;

            try {
                const response = await fetch('https://api.github.com/graphql', {
                    method: 'POST',
                    headers: {
                        'Authorization': `bearer ${token}`,
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ query })
                });
                
                if (!response.ok) {
                    if (response.status === 401) throw new Error('Tokenが無効、または期限切れです。');
                    throw new Error(`APIエラー: ${response.statusText}`);
                }

                const result = await response.json();
                
                if (result.errors) {
                    throw new Error(result.errors[0].message);
                }

                const repoData = result.data.repository;
                
                // Issueの振り分け
                repoData.issues.nodes.forEach(issue => {
                    if (issue.assignees && issue.assignees.nodes.length > 0) {
                        categorized.assigned.push(issue);
                    } else {
                        categorized.unassigned.push(issue);
                    }
                });

                // PRの振り分け
                repoData.pullRequests.nodes.forEach(pr => {
                    let lastReviewDate = 0;
                    let lastCommitDate = 0;

                    if (pr.latestReviews && pr.latestReviews.nodes.length > 0) {
                        lastReviewDate = new Date(pr.latestReviews.nodes[0].submittedAt).getTime();
                    }
                    if (pr.commits && pr.commits.nodes.length > 0 && pr.commits.nodes[0].commit.pushedDate) {
                        lastCommitDate = new Date(pr.commits.nodes[0].commit.pushedDate).getTime();
                    }

                    const hasReviewer = pr.reviewRequests.totalCount > 0;

                    if (lastReviewDate > 0) {
                        if (lastCommitDate > lastReviewDate) {
                            categorized.updated.push(pr); // レビュー後にコミットあり（再レビュー待ち）
                        } else {
                            categorized.reviewed.push(pr); // レビューで止まっている（レビュー修正待ち）
                        }
                    } else {
                        if (hasReviewer) {
                            categorized.pr_wait_review.push(pr); // レビュワー決定済（レビュー待ち）
                        } else {
                            categorized.pr_no_reviewer.push(pr); // レビュワーなし（レビュワー未決定）
                        }
                    }
                });

                renderColumns(categorized);

            } catch (error) {
                showMessage(error.message, true);
            } finally {
                btn.disabled = false;
                icon.classList.remove('fa-spin');
            }
        }
    </script>
</body>
</html>
